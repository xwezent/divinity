name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build fat jar
        run: gradle --no-daemon fatJar

      - name: Upload fat jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: divinity-fat-jar
          path: build/libs/divinity-*-all.jar
          if-no-files-found: error
